name: employee_flutter_app
description: "FFL Management Club App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0-240.0.dev

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^6.1.3
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.2.0
  firebase_core: ^4.5.0
  intl: ^0.20.2
  excel: ^4.0.6
  open_filex: ^4.7.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
